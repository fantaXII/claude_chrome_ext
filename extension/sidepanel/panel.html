<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="app">

    <!-- Header: page context -->
    <header class="header" id="header">
      <div class="header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" fill="#7C3AED"/>
          <text x="12" y="17" text-anchor="middle" fill="white" font-size="13" font-family="sans-serif" font-weight="bold">C</text>
        </svg>
      </div>
      <div class="header-context">
        <div class="page-title" id="pageTitle">Claude Code</div>
        <div class="page-url" id="pageUrl">페이지를 로딩 중...</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="clearBtn" title="/clear — 대화 초기화">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Status bar (errors / install guidance) -->
    <div class="status-bar hidden" id="statusBar">
      <span id="statusMsg"></span>
    </div>

    <!-- Messages -->
    <main class="messages" id="messages">
      <div class="welcome">
        <p>안녕하세요! 현재 페이지에 대해 무엇이든 질문하세요.</p>
        <p class="hint">팁: <code>/help</code> — 명령어 목록 &nbsp;|&nbsp; <code>/clear</code> — 대화 초기화</p>
      </div>
    </main>

    <!-- Input -->
    <footer class="input-area">
      <div class="input-wrapper">
        <textarea
          id="input"
          placeholder="질문을 입력하세요... (/ 로 명령어)"
          rows="1"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
        <button class="send-btn" id="sendBtn" title="전송 (Enter)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>
  <script src="panel.js"></script>
</body>
</html>
